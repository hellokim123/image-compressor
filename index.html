<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片压缩工具 - 免费在线压缩</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2em;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        
        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 60px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #f8f9ff;
        }
        
        .upload-area:hover {
            background: #e8ebff;
            border-color: #764ba2;
        }
        
        .upload-area.dragover {
            background: #e8ebff;
            border-color: #764ba2;
            transform: scale(1.02);
        }
        
        .upload-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }
        
        .upload-text {
            font-size: 18px;
            color: #333;
            margin-bottom: 10px;
        }
        
        .upload-hint {
            color: #999;
            font-size: 14px;
        }
        
        #fileInput {
            display: none;
        }
        
        .result-area {
            display: none;
            margin-top: 30px;
        }
        
        .preview-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 20px;
        }
        
        .preview-box {
            flex: 1;
            min-width: 280px;
            text-align: center;
        }
        
        .preview-box img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .preview-label {
            font-weight: bold;
            margin: 15px 0 10px;
            color: #333;
        }
        
        .preview-info {
            color: #666;
            font-size: 14px;
        }
        
        .stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 20px 0;
            padding: 20px;
            background: #f8f9ff;
            border-radius: 10px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            color: #666;
            font-size: 14px;
        }
        
        .download-btn {
            display: block;
            width: 200px;
            margin: 20px auto;
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.3s;
            text-decoration: none;
        }
        
        .download-btn:hover {
            transform: scale(1.05);
        }
        
        .quality-control {
            text-align: center;
            margin: 20px 0;
        }
        
        .quality-control label {
            display: block;
            margin-bottom: 10px;
            color: #333;
        }
        
        .quality-control input[type="range"] {
            width: 300px;
            height: 8px;
            border-radius: 5px;
            background: #ddd;
            outline: none;
            -webkit-appearance: none;
        }
        
        .quality-control input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
        }
        
        .quality-value {
            margin-top: 10px;
            color: #666;
        }
        
        .tips {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🖼️ 图片压缩工具</h1>
        <p class="subtitle">免费在线压缩，支持 JPG/PNG/WebP</p>
        
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <div class="upload-text">拖拽图片到这里，或点击选择</div>
            <div class="upload-hint">支持 JPG、PNG、WebP 格式，单个文件最大 10MB</div>
            <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp">
        </div>
        
        <div class="result-area" id="resultArea">
            <div class="quality-control">
                <label>压缩质量: <span id="qualityValue">80</span>%</label>
                <input type="range" id="qualitySlider" min="10" max="100" value="80">
            </div>
            
            <div class="preview-container">
                <div class="preview-box">
                    <div class="preview-label">原图</div>
                    <img id="originalImg" src="" alt="原图">
                    <div class="preview-info" id="originalInfo"></div>
                </div>
                <div class="preview-box">
                    <div class="preview-label">压缩后</div>
                    <img id="compressedImg" src="" alt="压缩后">
                    <div class="preview-info" id="compressedInfo"></div>
                </div>
            </div>
            
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="originalSize">-</div>
                    <div class="stat-label">原图大小</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="compressedSize">-</div>
                    <div class="stat-label">压缩后</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="savedPercent">-</div>
                    <div class="stat-label">节省</div>
                </div>
            </div>
            
            <a class="download-btn" id="downloadBtn" download="compressed-image.jpg">
                下载压缩后的图片
            </a>
        </div>
        
        <p class="tips">🔒 所有压缩在浏览器本地完成，不会上传服务器，保护隐私</p>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const resultArea = document.getElementById('resultArea');
        const qualitySlider = document.getElementById('qualitySlider');
        const qualityValue = document.getElementById('qualityValue');
        
        let originalFile = null;
        let originalImageBitmap = null;
        
        // 点击上传
        uploadArea.addEventListener('click', () => fileInput.click());
        
        // 文件选择
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });
        
        // 拖拽上传
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                handleFile(e.dataTransfer.files[0]);
            }
        });
        
        // 质量滑块
        qualitySlider.addEventListener('input', (e) => {
            qualityValue.textContent = e.target.value;
            if (originalFile) {
                compressImage(originalFile, e.target.value / 100);
            }
        });
        
        function handleFile(file) {
            if (!file.type.match(/image\/(jpeg|png|webp)/)) {
                alert('请上传 JPG、PNG 或 WebP 格式的图片');
                return;
            }
            
            if (file.size > 10 * 1024 * 1024) {
                alert('文件大小不能超过 10MB');
                return;
            }
            
            originalFile = file;
            
            // 显示原图信息
            document.getElementById('originalInfo').textContent = 
                `${file.name} (${formatSize(file.size)})`;
            document.getElementById('originalSize').textContent = formatSize(file.size);
            
            // 显示原图
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('originalImg').src = e.target.result;
                compressImage(file, qualitySlider.value / 100);
            };
            reader.readAsDataURL(file);
            
            resultArea.style.display = 'block';
        }
        
        function compressImage(file, quality) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    
                    // 压缩
                    const compressedDataUrl = canvas.toDataURL('image/jpeg', quality);
                    document.getElementById('compressedImg').src = compressedDataUrl;
                    
                    // 计算压缩后大小
                    const base64 = compressedDataUrl.split(',')[1];
                    const compressedSize = Math.round(base64.length * 0.75);
                    
                    document.getElementById('compressedSize').textContent = formatSize(compressedSize);
                    
                    // 计算节省百分比
                    const saved = ((file.size - compressedSize) / file.size * 100).toFixed(1);
                    document.getElementById('savedPercent').textContent = saved > 0 ? `-${saved}%` : '+0%';
                    
                    // 设置下载链接
                    const downloadBtn = document.getElementById('downloadBtn');
                    downloadBtn.href = compressedDataUrl;
                    
                    const ext = file.name.split('.').pop();
                    downloadBtn.download = `compressed-image.${ext === 'png' ? 'png' : 'jpg'}`;
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }
        
        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
        }
    </script>
</body>
</html>
